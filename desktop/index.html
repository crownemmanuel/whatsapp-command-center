<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WhatsApp Command Center</title>
  <style>
    :root {
      --bg: #111412;
      --panel: #191e1b;
      --line: #2e3a34;
      --text: #f2f6f3;
      --muted: #99a79f;
      --accent: #23d366;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #111412 0%, #1b2921 52%, #080a09 100%);
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
    }
    main {
      width: min(560px, calc(100vw - 32px));
      display: grid;
      gap: 14px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(25,30,27,0.94);
      box-shadow: 0 20px 80px rgba(0,0,0,0.38);
    }
    h1 { margin: 0; font-size: 1.45rem; letter-spacing: 0; }
    p { margin: 0; color: var(--muted); line-height: 1.45; }
    .bar {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #101513;
    }
    .bar span {
      display: block;
      width: 42%;
      height: 100%;
      background: var(--accent);
      animation: load 1.1s ease-in-out infinite alternate;
    }
    @keyframes load {
      from { transform: translateX(-70%); }
      to { transform: translateX(210%); }
    }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button {
      border-radius: 8px;
      border: 1px solid #3b4a44;
      background: #121715;
      color: var(--text);
      padding: 9px 11px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #06120b; }
    .error { color: #ffd7dd; }
  </style>
</head>
<body>
  <main>
    <h1>WhatsApp Command Center</h1>
    <p id="status">Starting the local command center...</p>
    <div class="bar" aria-hidden="true"><span></span></div>
    <div class="row">
      <button id="open-browser" class="primary" type="button">Open in browser</button>
      <button id="retry" type="button">Retry</button>
    </div>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const openBrowserBtn = document.getElementById('open-browser');
    const retryBtn = document.getElementById('retry');
    const invoke = window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke;

    async function poll() {
      if (!invoke) {
        statusEl.textContent = 'Desktop bridge is unavailable.';
        statusEl.className = 'error';
        return;
      }

      try {
        const status = await invoke('backend_status');
        if (status.ready && status.url) {
          location.replace(status.url);
          return;
        }
        if (status.error) {
          statusEl.textContent = status.error;
          statusEl.className = 'error';
        } else {
          statusEl.textContent = 'Starting the local command center...';
          statusEl.className = '';
        }
      } catch (error) {
        statusEl.textContent = error && error.message ? error.message : String(error);
        statusEl.className = 'error';
      }
      setTimeout(poll, 450);
    }

    openBrowserBtn.onclick = async () => {
      if (!invoke) return;
      try { await invoke('open_in_browser'); } catch (error) { statusEl.textContent = String(error); }
    };
    retryBtn.onclick = () => location.reload();
    poll();
  </script>
</body>
</html>
